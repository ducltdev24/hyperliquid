services:
  btc-crawler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hyperliquid-btc-crawler
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://hyperliquid:hyperliquid@mysql:3306/hyperliquid
    volumes:
      - ../data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: hyperliquid-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=hyperliquid
      - MYSQL_USER=hyperliquid
      - MYSQL_PASSWORD=hyperliquid
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: hyperliquid-adminer
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: hyperliquid-phpmyadmin
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
    ports:
      - "8081:80"
    depends_on:
      - mysql
    restart: unless-stopped

volumes:
  mysql_data:
